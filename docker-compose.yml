services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://example.com}
    container_name: miu-card-visit
    restart: unless-stopped
    environment:
      NODE_ENV:             production
      ADMIN_PASSWORD:       ${ADMIN_PASSWORD}
      JWT_SECRET:           ${JWT_SECRET}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://example.com}
    volumes:
      # Persist profile.json across deploys; data dir owned by uid 1001 in image.
      - ./data:/app/data
      # Mount uploaded avatars into Next.js public/ so they're served at /uploads/*
      - ./data/uploads:/app/public/uploads
    networks:
      - proxy-net

networks:
  proxy-net:
    external: true
